<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Institutional Earnings Engine</title>
    
    <!-- YOUR DIRECT HEAD SCRIPT BLOCK -->
    <script>
    var o_options = {
        domain: 'jyz.outseta.com',
        load: 'auth,customForm,emailList,leadCapture,nocode,profile,support'
    };
    </script>
    <script src="https://cdn.outseta.com/outseta.min.js"
            data-options="o_options">
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0b0f19;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Premium Top Header Bar */
        .app-header {
            background-color: #051923;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .logo {
            color: #ffffff;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
            box-sizing: border-box;
            border: none;
        }

        .btn-secondary {
            background-color: transparent;
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* Dual Display Layout Frame */
        .workspace-layout {
            display: flex;
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 85px);
            overflow: hidden;
        }

        .iframe-container {
            flex-grow: 1;
            position: relative;
            height: 100%;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 40px); /* Crops out Streamlit footer tab cleanly */
            border: none;
        }

        /* Multi-Form Dynamic Sidebar Container */
        .interactive-sidebar {
            width: 440px;
            height: 100%;
            background-color: #070c14;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            overflow-y: auto;
            box-sizing: border-box;
            padding: 24px;
        }

        /* Form states handling */
        .sidebar-view { display: none; }
        .sidebar-view.active { display: block; }

        /* Premium Risk Disclaimer Segment */
        .app-disclaimer {
            background-color: #051923;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #4b5563;
            font-size: 11px;
            text-align: center;
            padding: 10px 24px;
            height: 35px;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 10;
        }

        /* Internal form element tweaks for better scroll boundaries */
        .interactive-sidebar div {
            max-height: 100% !important;
        }
    </style>
</head>
<body>

    <!-- Header View Layout Configuration -->
    <header class="app-header">
        <div class="logo">🦅 Institutional Earnings Engine</div>
        <div class="auth-buttons">
            <!-- Navigation links to control the dynamic sidebar view states -->
            <button class="btn btn-secondary" id="btn-show-register" data-o-anonymous="1">Upgrade/Register</button>
            <button class="btn btn-secondary" id="btn-show-login" data-o-anonymous="1">Sign In</button>
            <button class="btn btn-secondary" id="btn-show-profile" data-o-authenticated="1">⚙️ Settings</button>
            <a href="#o-logout-link" class="btn btn-secondary" data-o-authenticated="1">Log Out</a>
        </div>
    </header>

    <!-- Core App Canvas Workspace -->
    <div class="workspace-layout">
        <div class="iframe-container">
            <iframe 
                id="engine-iframe"
                src="https://earnings-predictor-xtak69nc8jmlhvaihtwhwy.streamlit.app/?embed=true" 
                allow="clipboard-read; clipboard-write">
            </iframe>
        </div>

        <!-- THE UNIFIED INLINE EMBED SIDEBAR PANEL -->
        <aside class="interactive-sidebar" id="app-sidebar">
            
            <!-- 1. REGISTRATION INLINE EMBED -->
            <div id="view-register" class="sidebar-view active">
                <div data-o-auth="1"
                     data-widget-mode="register"
                     data-plan-uid="awxoPv9V"
                     data-plan-payment-term="month"
                     data-skip-plan-options="true"
                     data-mode="embed">
                </div>
            </div>

            <!-- 2. LOGIN INLINE EMBED -->
            <div id="view-login" class="sidebar-view">
                <div data-o-auth="1"
                     data-mode="embed"
                     data-widget-mode="login">
                </div>
            </div>

            <!-- 3. PROFILE / BILLING INLINE EMBED -->
            <div id="view-profile" class="sidebar-view">
                <div data-o-profile="1"
                     data-mode="embed">
                </div>
            </div>

        </aside>
    </div>

    <!-- Premium Financial Disclaimer Footer -->
    <footer class="app-disclaimer">
        ⚠️ <strong>Risk Disclosure:</strong> All quantitative outputs, trend summaries, and calculated expected moves are generated strictly for computational educational research and do not constitute formal investment advice.
    </footer>

    <!-- STABLE SIDEBAR STATE CONTROLLER SCRIPT -->
    <script>
        const appIframe = document.getElementById('engine-iframe');
        const sidebar = document.getElementById('app-sidebar');
        
        const views = {
            register: document.getElementById('view-register'),
            login: document.getElementById('view-login'),
            profile: document.getElementById('view-profile')
        };

        // Changes active display panel inside the sidebar space smoothly
        function switchSidebarView(targetKey) {
            Object.keys(views).forEach(key => {
                if (key === targetKey) {
                    views[key].classList.add('active');
                } else {
                    views[key].classList.remove('active');
                }
            });
            sidebar.style.display = 'block';
        }

        // Handle user authentication transitions natively
        Outseta.on('init', function() {
            if (Outseta.getAccessToken()) {
                switchSidebarView('profile');
                sidebar.style.display = 'none'; // Auto-hide sidebar to give premium users full screen space
                appIframe.src = "https://earnings-predictor-xtak69nc8jmlhvaihtwhwy.streamlit.app/?embed=true&premium=true";
            } else {
                switchSidebarView('register');
            }
        });

        Outseta.on('accessToken.set', function(token) {
            switchSidebarView('profile');
            sidebar.style.display = 'none';
            appIframe.src = "https://earnings-predictor-xtak69nc8jmlhvaihtwhwy.streamlit.app/?embed=true&premium=true";
        });
        
        Outseta.on('accessToken.removed', function() {
            switchSidebarView('login');
            sidebar.style.display = 'block';
            appIframe.src = "https://earnings-predictor-xtak69nc8jmlhvaihtwhwy.streamlit.app/?embed=true";
        });

        // Setup manual header menu toggle triggers
        document.getElementById('btn-show-register').addEventListener('click', () => switchSidebarView('register'));
        document.getElementById('btn-show-login').addEventListener('click', () => switchSidebarView('login'));
        document.getElementById('btn-show-profile').addEventListener('click', () => switchSidebarView('profile'));
    </script>

</body>
</html>
