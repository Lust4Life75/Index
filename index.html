<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Institutional Earnings Engine</title>
    
    <!-- MATCHED OUTSETA HEAD SCRIPT CONFIGURATION -->
    <script>
      var o_options = {
        domain: 'jyz.outseta.com',
        load: 'auth,customForm,emaillist,leadCapture,nocode,profile,support',
        monitorDom: true,
        tokenStorage: 'local'
      };
    </script>
    <script src="https://cdn.outseta.com/outseta.min.js" data-options="o_options"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0b0f19;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Premium Top Header Bar */
        .app-header {
            background-color: #051923;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .logo {
            color: #ffffff;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
            box-sizing: border-box;
            border: none;
        }

        .btn-primary {
            background-color: #26a69a;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2bbbad;
        }

        .btn-secondary {
            background-color: transparent;
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* Visibility classes for explicit auth states */
        .logged-out-only { display: inline-block; }
        .logged-in-only { display: none; }

        /* Main Application Layout Frame */
        .iframe-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: calc(100% - 85px);
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 40px); /* Crops out Streamlit footer tab cleanly */
            border: none;
        }

        /* Premium Risk Disclaimer Segment */
        .app-disclaimer {
            background-color: #051923;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #4b5563;
            font-size: 11px;
            text-align: center;
            padding: 10px 24px;
            height: 35px;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 10;
        }

        /* STRIPE OVERFLOW MODAL PATCH */
        [id^="outseta-"], .o-modal, #outseta-profile-embed, div[role="dialog"] {
            max-height: 95vh !important;
            height: auto !important;
            overflow-y: visible !important;
        }
        .o-modal-inner, .o-profile-embed-inner, div[class*="modal-content"] {
            max-height: 80vh !important;
            overflow-y: auto !important;
        }
    </style>
</head>
<body>

    <!-- Header View Configuration -->
    <header class="app-header">
        <div class="logo">🦅 Institutional Earnings Engine</div>
        <div class="auth-buttons">
            <!-- ANONYMOUS STATE CONTROLS (Direct checkout tabs) -->
            <a href="https://jyz.outseta.com/auth?widgetMode=register&planUid=awxoPv9V&planPaymentTerm=month&skipPlanOptions=true" target="_blank" class="btn btn-primary logged-out-only" id="nav-upgrade">Upgrade to Pro</a>
            <button class="btn btn-secondary logged-out-only" id="nav-login">Sign In</button>

            <!-- AUTHENTICATED STATE CONTROLS -->
            <button class="btn btn-secondary logged-in-only" id="nav-settings">⚙️ Settings</button>
            <button class="btn btn-secondary logged-in-only" id="nav-logout">Log Out</button>
        </div>
    </header>

    <!-- Core Engine App Iframe -->
    <div class="iframe-container">
        <iframe 
            id="engine-iframe"
            src="https://earnings-predictor-xtak69nc8jmlhvaihtwhwy.streamlit.app/?embed=true" 
            allow="clipboard-read; clipboard-write">
        </iframe>
    </div>

    <!-- Premium Financial Disclaimer Footer -->
    <footer class="app-disclaimer">
        ⚠️ <strong>Risk Disclosure:</strong> All quantitative outputs, trend summaries, and calculated expected moves are generated strictly for computational educational research and do not constitute formal investment advice.
    </footer>

    <!-- STATE MANAGEMENT SYSTEM -->
    <script>
        const loggedOutElements = document.querySelectorAll('.logged-out-only');
        const loggedInElements = document.querySelectorAll('.logged-in-only');
        const appIframe = document.getElementById('engine-iframe');

        // Function to handle layout visibility toggles
        function updateUIState(isAuthenticated) {
            if (isAuthenticated) {
                loggedOutElements.forEach(el => el.style.display = 'none');
                loggedInElements.forEach(el => el.style.display = 'inline-block');
            } else {
                loggedOutElements.forEach(el => el.style.display = 'inline-block');
                loggedInElements.forEach(el => el.style.display = 'none');
            }
        }

        // Outseta Initialization & Event Triggers
        Outseta.on('init', function() {
            const token = Outseta.getAccessToken();
            if (token) {
                updateUIState(true);
                appIframe.src = "https://earnings-predictor-xtak69nc8jmlhvaihtwhwy.streamlit.app/?embed=true&premium=true";
            } else {
                updateUIState(false);
            }
        });

        Outseta.on('accessToken.set', function(token) {
            updateUIState(true);
            appIframe.src = "https://earnings-predictor-xtak69nc8jmlhvaihtwhwy.streamlit.app/?embed=true&premium=true";
        });
        
        Outseta.on('accessToken.removed', function() {
            updateUIState(false);
            appIframe.src = "https://earnings-predictor-xtak69nc8jmlhvaihtwhwy.streamlit.app/?embed=true";
        });

        // Event Actions for Popup triggers
        document.getElementById('nav-login').addEventListener('click', function() {
            Outseta.auth.open({ widgetMode: 'login' });
        });

        document.getElementById('nav-settings').addEventListener('click', function() {
            Outseta.profile.open();
        });

        document.getElementById('nav-logout').addEventListener('click', function(e) {
            e.preventDefault();
            Outseta.auth.logout();
        });
    </script>

</body>
</html>
